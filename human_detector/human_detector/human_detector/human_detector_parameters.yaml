human_detector_parameters:
  pose_landmarker_model_path:
    type: string
    default_value: ""
    read_only: true
    description: "Absolute path to the MediaPipe pose landmarker .task model."
  horizontal_fov:
    type: double
    default_value: 0.0
    read_only: true
    description: "Horizontal FOV in radians. If > 0, use this manual pinhole model instead of CameraInfo intrinsics."
  camera_frame_id:
    type: string
    default_value: "camera_link"
    read_only: true
    description: "Name of frame containing the camera."
  rgb_image_topic:
    type: string
    default_value: "/camera/color/image_raw"
    read_only: true
    description: "RGB image topic used for person detection."
  depth_image_topic:
    type: string
    default_value: "/camera/depth/image_rect_raw"
    read_only: true
    description: "Depth image topic used for depth lookup."
  camera_info_topic:
    type: string
    default_value: "/camera/depth/camera_info"
    read_only: true
    description: "CameraInfo topic corresponding to the aligned RGB/depth images."
  detected_human_frame_id:
    type: string
    default_value: "detected_human"
    read_only: true
    description: "Name of frame containing detected human."
  detected_human_transform_frequency:
    type: int
    default_value: 10
    read_only: true
    description: "Frequency of publishing transform to detected human."
  publish_image_with_detected:
    type: bool
    default_value: true
    read_only: true
    description: "If Topic with detected human should be published or not."
  min_detection_confidence:
    type: double
    default_value: 0.5
    read_only: true
    description: "Mediapipe parameter. Minimum confidence value ([0.0, 1.0]) from the person-detection model for
                  the detection to be considered successful. Default to 0.5"
    validation:
      bounds<>: [0.0, 1.0]
  min_tracking_confidence:
    type: double
    default_value: 0.5
    read_only: true
    description: "Mediapipe parameter. Minimum confidence value ([0.0, 1.0]) from the landmark-tracking model for
                  the pose landmarks to be considered tracked successfully, or otherwise person detection will be
                  invoked automatically on the next input image."
    validation:
      bounds<>: [0.0, 1.0]
  time_approximation_slope:
    type: double
    default_value: 0.05
    read_only: true
    description: "Timer approximation slope for the msgs synchronization."
